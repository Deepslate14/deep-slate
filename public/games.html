    <style>
        :root {
            --primary: #1e2532;
            /* Deepslate blue-gray */
            --secondary: #131720;
            /* Darker stone for depth */
            --accent: #00b5d8;
            /* The intense bright blue/cyan from the arrow */
            --accent-glow: #0bc5ea;
            --text: #e2e8f0;
            --bg-dark: rgba(19, 23, 32, 0.95);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Pixelify Sans', 'Segoe UI', Tahoma, sans-serif;
            background-image: url('bg.png');
            background-size: 256px 256px;
            background-repeat: repeat;
            color: var(--text);
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(10, 10, 10, 0.7);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 181, 216, 0.6);
        }

        .header-logo {
            max-width: 180px;
            border-radius: 12px;
            animation: float 4s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 800;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link:hover {
            transform: translateX(-8px);
            color: #15c9a0;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: rgba(45, 45, 45, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .game-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(17, 170, 136, 0.4);
            background: rgba(60, 60, 60, 0.8);
        }

        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #111;
            transition: transform 0.5s ease;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        .game-info {
            padding: 1.2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .game-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
        }

        .game-desc {
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.4;
        }

        /* Fullscreen Game Player */
        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #player-container.active {
            display: flex;
            opacity: 1;
        }

        .player-navbar {
            height: 60px;
            width: 100%;
            background: linear-gradient(to right, #1a1a1a, #2a2a2a);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            box-sizing: border-box;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 2100;
        }

        .player-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--accent);
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .game-name-badge {
            background: rgba(17, 170, 136, 0.15);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--accent);
            font-size: 0.9rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .player-actions {
            display: flex;
            gap: 1.5rem;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: #eee;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        .action-btn.close {
            color: #ff5555;
        }

        .action-btn.close:hover {
            color: #ff8888;
            text-shadow: 0 0 10px rgba(255, 85, 85, 0.5);
        }

        iframe#game-iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        /* Loading Screen */
        .loading-overlay {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2050;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(17, 170, 136, 0.1);
            border-top: 8px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 20px rgba(17, 170, 136, 0.2);
        }

        .loading-msg {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0.4;
                transform: scale(0.95);
            }
        }

        .footer {
            margin-top: 5rem;
            text-align: center;
            padding: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: #666;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .header-logo {
                max-width: 180px;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
                gap: 1rem;
            }

            .game-card img {
                height: 100px;
            }

            .player-navbar {
                padding: 0.5rem 1rem;
                flex-wrap: wrap;
                height: auto;
                gap: 0.8rem;
            }

            .player-brand {
                font-size: 1.1rem;
            }

            .game-name-badge {
                display: none;
            }

            /* Hide on mobile to save space */
            .player-actions {
                width: 100%;
                justify-content: space-between;
            }

            .action-btn {
                font-size: 0.8rem;
            }
        }

        async function initUV() {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('/sw.js', {
                    scope: __uv$config.prefix
                });
            }
            const conn = new BareMux.BareMuxConnection('/baremux/worker.js');
            if (!await conn.getTransport()) {
                const bareUrl = location.origin + '/bare/';
                await conn.setTransport('/bare-as-module3/index.mjs', [bareUrl]);
            }
        }

        initUV();

        const grid = document.getElementById('games-grid');
        const player = document.getElementById('player-container');
        const iframe = document.getElementById('game-iframe');
        const loading = document.getElementById('loading-overlay');
        const mainUI = document.getElementById('main-ui');
        const playerTitle = document.getElementById('player-game-title');

        // Create Game Tiles
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <img src="${game.img}" alt="${game.title}" onerror="this.src='https://via.placeholder.com/300x150/111/444?text=${game.title}'">
                <div class="game-info">
                    <div class="game-title">${game.title}</div>
                    <div class="game-desc">${game.desc}</div>
                </div>
            `;
            card.onclick = () => openGame(game.url, game.title);
            grid.appendChild(card);
        });

        function openGame(url, title) {
            playerTitle.innerText = title;
            player.style.display = 'flex';
            setTimeout(() => player.classList.add('active'), 10);
            loading.style.display = 'flex';
            mainUI.style.display = 'none';

            const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);
            iframe.src = encodedUrl;

            iframe.onload = () => {
                loading.style.display = 'none';
            };
        }

        function closeGamePlayer() {
            player.classList.remove('active');
            setTimeout(() => {
                player.style.display = 'none';
                iframe.src = 'about:blank';
                mainUI.style.display = 'block';
            }, 500);
        }

        function reloadGame() {
            const currentUrl = iframe.src;
            iframe.src = 'about:blank';
            loading.style.display = 'flex';
            setTimeout(() => {
                iframe.src = currentUrl;
            }, 100);
        }

        function togglePlayerFullscreen() {
            if (!document.fullscreenElement) {
                iframe.requestFullscreen().catch(err => {
                    alert(`Direct Fullscreen Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Close on Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && player.classList.contains('active')) {
                closeGamePlayer();
            }
        });

        // Ore spawning removed due to copyright compliance.
        function spawnOres() {
            // No-op
        }
        window.addEventListener('load', spawnOres);
    </script>
