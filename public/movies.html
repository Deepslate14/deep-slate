<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Slate Movies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e2532;
            --secondary: #131720;
            --accent: #00b5d8;
            --movie-accent: #e50914;
            /* Cinema red */
            --movie-gold: #f5c518;
            /* IMDb gold */
            --text: #e2e8f0;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Pixelify Sans', 'Segoe UI', Tahoma, sans-serif;
            background-image: url('bg.png');
            background-size: 256px 256px;
            background-repeat: repeat;
            color: var(--text);
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(5, 5, 10, 0.78);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header-logo {
            max-width: 180px;
            border-radius: 12px;
            animation: float 4s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        header p {
            color: #a0aec0;
            font-size: 1.1rem;
            margin: 0;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 800;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link:hover {
            transform: translateX(-8px);
            color: var(--movie-accent);
        }

        /* Section label */
        .section-label {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--movie-accent);
            margin-bottom: 1rem;
            margin-top: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(229, 9, 20, 0.4), transparent);
        }

        /* Platform cards */
        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.5rem;
        }

        .platform-card {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            height: 190px;
            display: flex;
            align-items: flex-end;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        .platform-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(229, 9, 20, 0.3);
            border-color: var(--movie-accent);
        }

        .card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease;
        }

        .platform-card:hover .card-bg {
            transform: scale(1.08);
        }

        .card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.35) 55%, transparent 100%);
        }

        .card-info {
            position: relative;
            z-index: 2;
            padding: 1.2rem 1.5rem;
            width: 100%;
        }

        .card-logo {
            height: 32px;
            max-width: 120px;
            object-fit: contain;
            margin-bottom: 0.4rem;
            filter: brightness(1.2);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.2rem;
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.25rem 0.7rem;
            border-radius: 50px;
        }

        .card-badge.free {
            background: rgba(29, 185, 84, 0.2);
            border: 1px solid #1db954;
            color: #1db954;
        }

        .card-badge.premium {
            background: rgba(229, 9, 20, 0.2);
            border: 1px solid var(--movie-accent);
            color: var(--movie-accent);
        }

        .card-badge.gold {
            background: rgba(245, 197, 24, 0.2);
            border: 1px solid var(--movie-gold);
            color: var(--movie-gold);
        }

        /* Player */
        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #player-container.active {
            display: flex;
            opacity: 1;
        }

        .player-navbar {
            height: 60px;
            width: 100%;
            background: linear-gradient(to right, #0a0000, #1a0000);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            box-sizing: border-box;
            border-bottom: 2px solid var(--movie-accent);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            z-index: 2100;
        }

        .player-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--movie-accent);
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .movie-badge {
            background: rgba(229, 9, 20, 0.15);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--movie-accent);
            font-size: 0.9rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .player-actions {
            display: flex;
            gap: 1.5rem;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: #eee;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
            font-family: 'Pixelify Sans', sans-serif;
        }

        .action-btn:hover {
            color: var(--movie-accent);
            transform: scale(1.1);
        }

        .action-btn.close {
            color: #ff5555;
        }

        .action-btn.close:hover {
            color: #ff8888;
        }

        iframe#movie-iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #050005;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2050;
        }

        /* Film reel loader */
        .reel {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(229, 9, 20, 0.1);
            border-top: 8px solid var(--movie-accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.25);
        }

        .loading-msg {
            margin-top: 2rem;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--movie-accent);
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        /* Ticket stub dots */
        .ticket-dots {
            display: flex;
            gap: 8px;
            margin-top: 1.5rem;
        }

        .ticket-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--movie-accent);
            animation: blink 1.2s ease-in-out infinite;
            box-shadow: 0 0 8px var(--movie-accent);
        }

        .ticket-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .ticket-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0.4;
                transform: scale(0.95);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .footer {
            margin-top: 5rem;
            text-align: center;
            padding: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: #555;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-logo {
                max-width: 180px;
            }

            .platforms-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .platform-card {
                height: 150px;
            }

            .card-title {
                font-size: 1.1rem;
            }

            .card-desc {
                font-size: 0.7rem;
            }

            .player-navbar {
                padding: 0.5rem 1rem;
                flex-wrap: wrap;
                height: auto;
                gap: 0.8rem;
            }

            .player-brand {
                font-size: 1.1rem;
            }

            .movie-badge {
                display: none;
            }

            /* Hide on mobile to save space */
            .player-actions {
                width: 100%;
                justify-content: space-between;
            }

            .action-btn {
                font-size: 0.8rem;
            }
        }
    </style>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/cloaking.js"></script>
    <script src="/settings.js"></script>
</head>

<body>
    <div class="overlay"></div>

    <!-- Movie Player -->
    <div id="player-container">
        <nav class="player-navbar">
            <div class="player-brand">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" />
                    <line x1="7" y1="2" x2="7" y2="22" />
                    <line x1="17" y1="2" x2="17" y2="22" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <line x1="2" y1="7" x2="7" y2="7" />
                    <line x1="17" y1="7" x2="22" y2="7" />
                    <line x1="17" y1="17" x2="22" y2="17" />
                    <line x1="2" y1="17" x2="7" y2="17" />
                </svg>
                DEEP SLATE
                <span class="movie-badge" id="player-movie-title">Now Streaming</span>
            </div>
            <div class="player-actions">
                <button class="action-btn" onclick="reloadPlayer()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                    Reload
                </button>
                <button class="action-btn" onclick="toggleFullscreen()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                    </svg>
                    Fullscreen
                </button>
                <button class="action-btn close" onclick="closePlayer()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                    EXIT
                </button>
            </div>
        </nav>
        <div class="loading-overlay" id="loading-overlay">
            <div class="reel"></div>
            <div class="ticket-dots">
                <div class="ticket-dot"></div>
                <div class="ticket-dot"></div>
                <div class="ticket-dot"></div>
            </div>
            <div class="loading-msg">Loading Feature...</div>
        </div>
        <iframe id="movie-iframe"></iframe>
    </div>

    <div class="container" id="main-ui">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <a href="/" class="back-link" style="margin-bottom: 0;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Terminal
            </a>
            <a href="/credits.html" class="back-link" style="margin-bottom: 0; color: var(--muted);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="16" x2="12" y2="12" />
                    <line x1="12" y1="8" x2="12.01" y2="8" />
                </svg>
                Credits
            </a>
        </div>

        <header>
            <img src="logo.png" alt="Deep Slate" class="header-logo" onerror="this.style.display='none';">
            <p>Stream movies &amp; shows. No restrictions. Full screen.</p>
        </header>

        <!-- Free Streaming -->
        <div class="section-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
            </svg>
            Free to Watch
        </div>
        <div class="platforms-grid" id="free-grid"></div>

        <!-- Premium Streaming -->
        <div class="section-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
            Premium Platforms
        </div>
        <div class="platforms-grid" id="premium-grid"></div>

        <div class="footer">
            Deep Slate Proxy &copy; 2026. Powered by Ultraviolet &amp; Bare-Mux.
        </div>
    </div>

    <script>
        async function initUV() {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('/sw.js', { scope: __uv$config.prefix });
            }
            const conn = new BareMux.BareMuxConnection('/baremux/worker.js');
            if (!await conn.getTransport()) {
                await conn.setTransport('/bare-as-module3/index.mjs', [location.origin + '/bare/']);
            }
        }
        initUV();

        const free = [
            {
                title: "Soap2day",
                desc: "Massive HD library — movies & shows free",
                url: "https://soap2day.ac",
                badge: "HD FREE", badgeClass: "free",
                bg: "linear-gradient(135deg, #0a0010 0%, #12001e 50%, #6c00ff 300%)",
                logo: "https://soap2day.ac/favicon.ico"
            },
            {
                title: "Cineb",
                desc: "New releases in HD — no ads, no signup",
                url: "https://cineb.rs",
                badge: "AD-FREE", badgeClass: "free",
                bg: "linear-gradient(135deg, #000a0d 0%, #00141a 50%, #00c2e0 300%)",
                logo: "https://cineb.rs/favicon.ico"
            },
            {
                title: "Bflix",
                desc: "Full HD streaming with huge movie catalog",
                url: "https://bflix.gg",
                badge: "HD FREE", badgeClass: "free",
                bg: "linear-gradient(135deg, #0d0000 0%, #1a0000 50%, #e50914 300%)",
                logo: "https://bflix.gg/favicon.ico"
            },
            {
                title: "LookMovie",
                desc: "HD movies & TV shows with subtitles",
                url: "https://lookmovie2.to",
                badge: "HD FREE", badgeClass: "free",
                bg: "linear-gradient(135deg, #001a0a 0%, #002210 50%, #00c853 300%)",
                logo: "https://lookmovie2.to/favicon.ico"
            },
            {
                title: "Hurawatch",
                desc: "Huge library, multiple servers, no login",
                url: "https://hurawatch.bz",
                badge: "FREE", badgeClass: "free",
                bg: "linear-gradient(135deg, #0d0a00 0%, #1a1400 50%, #f5c518 300%)",
                logo: "https://hurawatch.bz/favicon.ico"
            },
            {
                title: "MyFlixer",
                desc: "Stream in HD free — no ads, no registration",
                url: "https://myflixer.it",
                badge: "NO ADS", badgeClass: "free",
                bg: "linear-gradient(135deg, #00000d 0%, #000019 50%, #3d5afe 300%)",
                logo: "https://myflixer.it/favicon.ico"
            },
        ];

        const premium = [
            {
                title: "Netflix",
                desc: "The world's largest streaming library",
                url: "https://www.netflix.com",
                badge: "PREMIUM", badgeClass: "premium",
                bg: "linear-gradient(135deg, #0d0000 0%, #1a0000 40%, #e50914 300%)",
                logo: "https://assets.nflxext.com/ffe/siteui/common/icons/nficon2016.ico"
            },
            {
                title: "Disney+",
                desc: "Marvel, Star Wars, Pixar & more",
                url: "https://www.disneyplus.com",
                badge: "PREMIUM", badgeClass: "premium",
                bg: "linear-gradient(135deg, #00000d 0%, #00001a 40%, #0063e5 300%)",
                logo: "https://www.disneyplus.com/favicon.ico"
            },
            {
                title: "Prime Video",
                desc: "Amazon originals & blockbuster movies",
                url: "https://www.primevideo.com",
                badge: "PREMIUM", badgeClass: "premium",
                bg: "linear-gradient(135deg, #000d1a 0%, #001226 40%, #00a8e1 300%)",
                logo: "https://www.primevideo.com/favicon.ico"
            },
            {
                title: "Hulu",
                desc: "TV shows, movies & live TV",
                url: "https://www.hulu.com",
                badge: "PREMIUM", badgeClass: "premium",
                bg: "linear-gradient(135deg, #001a00 0%, #002200 40%, #1ce783 300%)",
                logo: "https://www.hulu.com/favicon.ico"
            },
            {
                title: "HBO Max",
                desc: "HBO, DC, Warner Bros originals",
                url: "https://www.max.com",
                badge: "PREMIUM", badgeClass: "premium",
                bg: "linear-gradient(135deg, #0d0020 0%, #1a0040 40%, #6200ee 300%)",
                logo: "https://www.max.com/favicon.ico"
            },
            {
                title: "Crunchyroll",
                desc: "Anime simulcasts & classic series",
                url: "https://www.crunchyroll.com",
                badge: "ANIME", badgeClass: "gold",
                bg: "linear-gradient(135deg, #1a0a00 0%, #2d1000 40%, #f47521 300%)",
                logo: "https://www.crunchyroll.com/build/assets/img/favicons/favicon-32x32.png"
            },
        ];

        function buildCards(data, gridId) {
            const grid = document.getElementById(gridId);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'platform-card';
                card.innerHTML = `
                    <div class="card-bg" style="background: ${item.bg};"></div>
                    <div class="card-gradient"></div>
                    <span class="card-badge ${item.badgeClass}">${item.badge}</span>
                    <div class="card-info">
                        <img class="card-logo" src="${item.logo}" alt="${item.title}" onerror="this.style.display='none'">
                        <div class="card-title">${item.title}</div>
                        <div class="card-desc">${item.desc}</div>
                    </div>
                `;
                card.onclick = () => openPlayer(item.url, item.title);
                grid.appendChild(card);
            });
        }

        buildCards(free, 'free-grid');
        buildCards(premium, 'premium-grid');

        const player = document.getElementById('player-container');
        const iframe = document.getElementById('movie-iframe');
        const loading = document.getElementById('loading-overlay');
        const mainUI = document.getElementById('main-ui');
        const movieTitle = document.getElementById('player-movie-title');

        function openPlayer(url, title) {
            movieTitle.innerText = title;
            player.style.display = 'flex';
            setTimeout(() => player.classList.add('active'), 10);
            loading.style.display = 'flex';
            mainUI.style.display = 'none';
            const encoded = __uv$config.prefix + __uv$config.encodeUrl(url);
            iframe.src = encoded;
            iframe.onload = () => { loading.style.display = 'none'; };
        }

        function closePlayer() {
            player.classList.remove('active');
            setTimeout(() => {
                player.style.display = 'none';
                iframe.src = 'about:blank';
                mainUI.style.display = 'block';
            }, 500);
        }

        function reloadPlayer() {
            const cur = iframe.src;
            iframe.src = 'about:blank';
            loading.style.display = 'flex';
            setTimeout(() => { iframe.src = cur; }, 100);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                iframe.requestFullscreen().catch(() => { });
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && player.classList.contains('active')) closePlayer();
        });
    </script>
</body>

</html>
